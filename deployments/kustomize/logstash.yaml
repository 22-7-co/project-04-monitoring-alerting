apiVersion: v1
kind: Service
metadata:
  name: logstash
  namespace: monitoring-stack
spec:
  selector:
    app: logstash
  ports:
    - name: beats
      port: 5044
      targetPort: 5044
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: logstash
  namespace: monitoring-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: logstash
  template:
    metadata:
      labels:
        app: logstash
    spec:
      containers:
        - name: logstash
          image: docker.elastic.co/logstash/logstash:8.11.1
          imagePullPolicy: IfNotPresent
          env:
            - name: LS_JAVA_OPTS
              value: "-Xms256m -Xmx256m"
          ports:
            - containerPort: 5044
              name: beats
          volumeMounts:
            - name: pipeline
              mountPath: /usr/share/logstash/pipeline/logstash.conf
              subPath: logstash.conf
            - name: cfg
              mountPath: /usr/share/logstash/config/logstash.yml
              subPath: logstash.yml
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              memory: "1Gi"
      volumes:
        - name: pipeline
          configMap:
            name: logstash-pipeline-k8s
        - name: cfg
          configMap:
            name: logstash-config-cm
