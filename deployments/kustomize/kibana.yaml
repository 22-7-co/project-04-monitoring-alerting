apiVersion: v1
kind: Service
metadata:
  name: kibana
  namespace: monitoring-stack
spec:
  type: NodePort
  selector:
    app: kibana
  ports:
    - name: http
      port: 5601
      targetPort: 5601
      nodePort: 30560
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kibana
  namespace: monitoring-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kibana
  template:
    metadata:
      labels:
        app: kibana
    spec:
      containers:
        - name: kibana
          image: docker.elastic.co/kibana/kibana:8.11.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5601
              name: http
          env:
            - name: SERVER_HOST
              value: "0.0.0.0"
            - name: ELASTICSEARCH_HOSTS
              value: "http://elasticsearch:9200"
          resources:
            requests:
              cpu: "100m"
              memory: "512Mi"
            limits:
              memory: "1Gi"
