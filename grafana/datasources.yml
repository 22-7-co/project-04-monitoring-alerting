# Grafana 数据源预配置
#
# 该文件会在 Grafana 中自动配置 Prometheus 数据源。
# Grafana 启动时会自动加载，因此你无需手动添加数据源。
#
# 学习目标：
# - 理解 Grafana 数据源预配置机制
# - 配置 Prometheus 数据源
# - 设置用于自动创建仪表盘的数据源
#
# 参考文档：
# - https://grafana.com/docs/grafana/latest/administration/provisioning/
# - https://grafana.com/docs/grafana/latest/datasources/prometheus/

apiVersion: 1

# TODO：配置 Prometheus 数据源
# 该配置告诉 Grafana 从哪里拉取指标
#
# datasources:
#   - name: Prometheus
#     type: prometheus
#     access: proxy
#     url: http://prometheus:9090
#     isDefault: true
#     editable: true
#     jsonData:
#       timeInterval: "15s"
#       httpMethod: POST
#
# 参数说明：
# - name：Grafana 中显示的数据源名称
# - type：数据源类型（prometheus、elasticsearch 等）
# - access：proxy = 由 Grafana 服务端拉取数据（推荐）
#          direct = 由浏览器直接拉取数据（出于安全原因不推荐）
# - url：Prometheus 服务地址
# - isDefault：将其设为新仪表盘的默认数据源
# - editable：允许用户在 UI 中修改数据源配置
# - timeInterval：默认抓取间隔（应与 Prometheus 配置一致）
# - httpMethod：复杂查询使用 POST，简单查询使用 GET

