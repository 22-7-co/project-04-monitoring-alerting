name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  kustomize:
    name: Kustomize build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install kubectl v1.29.14
        run: |
          set -euo pipefail
          curl -fsSL -o kubectl "https://dl.k8s.io/release/v1.29.14/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl
          kubectl version --client
      - name: kubectl kustomize (matches production-simulation.md)
        run: |
          set -euo pipefail
          kubectl kustomize deployments/kustomize --load-restrictor LoadRestrictionsNone >/tmp/rendered.yaml
          test -s /tmp/rendered.yaml

  pytest:
    name: Pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: pip install pytest prometheus_client
      - name: Run tests
        run: pytest tests/ -v

  shellcheck:
    name: Shellcheck (ops scripts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: shellcheck ops/scripts/*.sh
