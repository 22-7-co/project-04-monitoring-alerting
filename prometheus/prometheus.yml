# =============================================================================
# 配置测试
# =============================================================================

# 验证步骤：
# 1. 启动 Prometheus：docker-compose up -d prometheus
# 2. 查看配置：http://localhost:9090/config
# 3. 查看抓取目标：http://localhost:9090/targets
# 4. 验证指标：http://localhost:9090/graph
#    - 查询：up
#    - 应显示所有目标值为 1（up）或 0（down）
# 5. 测试告警：http://localhost:9090/alerts


# =============================================================================
# 常见问题与解决方案
# =============================================================================

# 问题：目标显示为 "DOWN"
# 解决方案：
# - 检查目标是否运行：docker-compose ps
# - 检查网络：目标必须在同一 Docker 网络
# - 检查防火墙：端口必须可访问
# - 检查 /metrics 端点：curl http://target:port/metrics

# 问题："context deadline exceeded" 错误
# 解决方案：
# - 增大 scrape_timeout（默认：与 scrape_interval 相同）
# - 检查目标性能（/metrics 端点响应过慢）

# 问题：内存占用过高
# 解决方案：
# - 降低 scrape_interval
# - 缩短指标保留时长
# - 降低高基数指标数量

# 问题：时序数据出现断点
# 解决方案：
# - 检查 Prometheus 日志中的抓取错误
# - 确保网络连接稳定
# - 检查目标服务可用性
