# 集群内 Prometheus 配置

global:
  scrape_interval: 15s
  evaluation_interval: 30s
  external_labels:
    cluster: ml-infra-k8s
    environment: k3s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]
      timeout: 10s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  # Prometheus / Alertmanager：经 Endpoints 自动发现（多副本或多节点时无需改配置）
  - job_name: prometheus
    kubernetes_sd_configs:
      - role: endpoints
        namespaces:
          names:
            - monitoring-stack
    relabel_configs:
      - source_labels: [__meta_kubernetes_service_name]
        action: keep
        regex: prometheus
      - source_labels: [__meta_kubernetes_endpoint_port_name]
        action: keep
        regex: http
      - source_labels: [__meta_kubernetes_namespace]
        target_label: kubernetes_namespace
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: kubernetes_pod_name
      - source_labels: [__meta_kubernetes_node_name]
        target_label: kubernetes_node
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: instance

  - job_name: alertmanager
    kubernetes_sd_configs:
      - role: endpoints
        namespaces:
          names:
            - monitoring-stack
    relabel_configs:
      - source_labels: [__meta_kubernetes_service_name]
        action: keep
        regex: alertmanager
      - source_labels: [__meta_kubernetes_endpoint_port_name]
        action: keep
        regex: http
      - source_labels: [__meta_kubernetes_namespace]
        target_label: kubernetes_namespace
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: kubernetes_pod_name
      - source_labels: [__meta_kubernetes_node_name]
        target_label: kubernetes_node
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: instance

  # 节点指标：每个 node-exporter Pod（DaemonSet）一条目标；instance = 节点名
  - job_name: node-exporter
    kubernetes_sd_configs:
      - role: endpoints
        namespaces:
          names:
            - monitoring-stack
    relabel_configs:
      - source_labels: [__meta_kubernetes_service_name]
        action: keep
        regex: node-exporter
      - source_labels: [__meta_kubernetes_endpoint_port_name]
        action: keep
        regex: http
      - action: labelmap
        regex: __meta_kubernetes_pod_label_(.+)
      - source_labels: [__meta_kubernetes_namespace]
        target_label: kubernetes_namespace
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: kubernetes_pod_name
      - source_labels: [__meta_kubernetes_node_name]
        target_label: kubernetes_node
      - source_labels: [__meta_kubernetes_node_name]
        target_label: instance
      - target_label: role
        replacement: ml-infrastructure

  - job_name: kubernetes-ml-api-pods
    metrics_path: /metrics
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - monitoring-stack
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: ml-api
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: "true"
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      - action: replace
        source_labels: [__meta_kubernetes_namespace]
        target_label: kubernetes_namespace
      - action: replace
        source_labels: [__meta_kubernetes_pod_name]
        target_label: kubernetes_pod_name
      - action: replace
        source_labels: [__meta_kubernetes_node_name]
        target_label: kubernetes_node
      - action: replace
        source_labels: [__meta_kubernetes_pod_label_app]
        target_label: service
