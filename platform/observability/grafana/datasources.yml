# 集群内 Grafana：经 Service DNS 访问 Prometheus / Elasticsearch

apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    # 使用完整 Service DNS，避免部分环境下短名解析异常
    url: http://prometheus.monitoring-stack.svc.cluster.local:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: "15s"
      # POST + 大范围 query_range 在 Prometheus 内存紧张时易被对端掐断（EOF）；GET 更稳
      httpMethod: GET
      # 秒（字符串）：Grafana 代理等待 Prometheus 响应的上限
      timeout: "120"

  - name: Elasticsearch
    uid: elasticsearch
    type: elasticsearch
    access: proxy
    url: http://elasticsearch:9200
    database: "logs-*"
    editable: true
    jsonData:
      esVersion: "8.0.0"
      timeField: "@timestamp"
      logMessageField: "message"
      logLevelField: "level"
      interval: Daily
      timeInterval: "10s"
