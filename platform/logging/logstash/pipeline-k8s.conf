# k3s 用最小可用流水线（保证 Beats -> Elasticsearch 基本可用）

input {
  beats {
    port => 5044
    host => "0.0.0.0"
  }
}

filter {
  if [message] =~ /^\{.*\}$/ {
    json {
      source => "message"
      target => "parsed"
      skip_on_invalid_json => true
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "logs-%{+YYYY.MM.dd}"
    ilm_enabled => false
    data_stream => false
  }
}
