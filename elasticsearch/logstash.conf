# Logstash 流水线配置
#
# 本文件定义 Logstash 如何处理日志：
# 1. Input：从 Filebeat 接收日志
# 2. Filter：解析、转换、增强日志
# 3. Output：发送到 Elasticsearch
#
# 学习目标：
# - 理解 Logstash 流水线结构
# - 学习使用 grok 与 json filter 进行日志解析
# - 实现日志增强与转换
# - 配置 Elasticsearch 输出
#
# 参考文档：
# - https://www.elastic.co/guide/en/logstash/current/configuration.html
# - https://www.elastic.co/guide/en/logstash/current/plugins-filters-grok.html

