# 3. 运行：docker-compose exec logstash /usr/share/logstash/bin/logstash -f /usr/share/logstash/pipeline/logstash.conf
# 4. 输入 JSON：{"timestamp": "2025-10-18T10:00:00Z", "level": "INFO", "message": "Test"}
# 5. 查看解析输出

# 方法 2：在 Elasticsearch 中查看处理后日志
# curl http://localhost:9200/logs-*/_search?pretty

# 方法 3：在 Kibana 中查看
# http://localhost:5601 → Discover → 选择索引模式 "logs-*"


# =============================================================================
# 常用 Grok 模式
# =============================================================================

# %{TIMESTAMP_ISO8601}     # 2025-10-18T14:32:10.123Z
# %{LOGLEVEL}              # INFO, ERROR, WARNING, DEBUG
# %{NUMBER}                # 123, 45.67
# %{UUID}                  # 123e4567-e89b-12d3-a456-426614174000
# %{IP}                    # 192.168.1.1
# %{URIPATH}               # /api/v1/predict
# %{GREEDYDATA}            # 匹配任意剩余内容（建议放在结尾）
# %{WORD}                  # 单个单词
# %{QUOTEDSTRING}          # "quoted string"

# 自定义模式：
# %{PATTERN:field_name:data_type}
# 示例：%{NUMBER:duration:float}


# =============================================================================
# 性能优化建议
# =============================================================================

# 1. 尽可能使用 JSON 日志
#    - 比 grok 解析更快
#    - 更稳定可靠
#    - 更易于处理

# 2. 减少 grok 模式数量
#    - Grok 对 CPU 开销较高
#    - 使用更具体的模式，避免滥用 GREEDYDATA

# 3. 尽早过滤
#    - 在处理前丢弃不必要日志
#    - 可减少 Elasticsearch 负载

# 4. 批处理
#    - Logstash 会批量处理事件以提高效率
#    - 默认：每批 125 条事件

# 5. 多流水线
#    - 按日志类型拆分流水线
#    - 避免单个慢源阻塞其他源
