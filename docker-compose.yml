# 监控栈的 Docker Compose
#
# 此文件用于部署完整的监控基础设施：
# - Prometheus（指标）
# - Alertmanager（告警）
# - Grafana（可视化）
# - Elasticsearch（日志存储）
# - Logstash（日志处理）
# - Kibana（日志可视化）
# - Filebeat（日志传输）
# - Node Exporter（系统指标）
#
# 学习目标：
# - 部署多容器监控栈
# - 配置服务依赖关系
# - 设置持久化存储
# - 配置服务间网络
#
# 用法：
#   docker-compose up -d        # 启动所有服务
#   docker-compose ps           # 查看状态
#   docker-compose logs -f      # 查看日志
#   docker-compose down         # 停止并移除

version: '3.8'

# =============================================================================
# 网络
# =============================================================================

networks:
  monitoring:
    driver: bridge
    # TODO: 如有需要，配置自定义网络设置
    # ipam:
    #   config:
    #     - subnet: 172.20.0.0/16


# =============================================================================
# 卷（持久化存储）
# =============================================================================

volumes:
  # TODO: 为持久化数据创建命名卷
  # 即使容器被移除，这些卷中的数据仍会保留
  #
  prometheus_data:
    driver: local
  
  alertmanager_data:
    driver: local
  
  grafana_data:
    driver: local
  
  elasticsearch_data:
    driver: local
  
  filebeat_data:
     driver: local


# =============================================================================
# 服务
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Prometheus - 指标采集与存储
  # ---------------------------------------------------------------------------

  # TODO: 添加 Prometheus 服务
  #
  prometheus:
    image: prom/prometheus:v2.47.2
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=10GB'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    networks:
      - monitoring
    depends_on:
      - alertmanager
  #
  # 命令参数说明：
  # --config.file: Prometheus 配置文件路径
  # --storage.tsdb.path: 指标存储路径
  # --storage.tsdb.retention.time: 指标保留 30 天
  # --storage.tsdb.retention.size: 最大存储 10GB
  # --web.enable-lifecycle: 允许通过 HTTP POST 重新加载配置
  # --web.enable-admin-api: 启用管理 API（删除等操作）


  # ---------------------------------------------------------------------------
  # Alertmanager - 告警路由与通知
  # ---------------------------------------------------------------------------

  # TODO: 添加 Alertmanager 服务
  #
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://localhost:9093'
    networks:
      - monitoring
  #
  # TODO: 创建 alertmanager.yml 配置文件
  # mkdir -p alertmanager && touch alertmanager/alertmanager.yml


  # ---------------------------------------------------------------------------
  # Grafana - 可视化与仪表盘
  # ---------------------------------------------------------------------------

  # TODO: 添加 Grafana 服务
  #
  grafana:
    image: grafana/grafana:10.2.2
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin123}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_INSTALL_PLUGINS=grafana-piechart-panel,grafana-clock-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - monitoring
    depends_on:
      - prometheus
  #
  # 环境变量说明：
  # GF_SECURITY_ADMIN_USER: 管理员用户名（来自 .env）
  # GF_SECURITY_ADMIN_PASSWORD: 管理员密码（来自 .env）
  # GF_USERS_ALLOW_SIGN_UP: 禁用用户自注册
  # GF_INSTALL_PLUGINS: 启动时自动安装插件


  # ---------------------------------------------------------------------------
  # Elasticsearch - 日志存储与检索
  # ---------------------------------------------------------------------------

  # TODO: 添加 Elasticsearch 服务
  #
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    container_name: elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - monitoring
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
  #
  # 环境变量说明：
  # discovery.type=single-node: 以单节点集群运行（用于开发/测试）
  # ES_JAVA_OPTS: JVM 堆大小（最小 512MB，最大 512MB）
  # xpack.security.enabled=false: 本地开发禁用安全（生产环境严禁！）
  #
  # 注意：生产环境请启用安全并使用正确的认证机制


  # ---------------------------------------------------------------------------
  # Logstash - 日志处理管道
  # ---------------------------------------------------------------------------

  # TODO: 添加 Logstash 服务
  #
  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.1
    container_name: logstash
    restart: unless-stopped
    ports:
      - "5000:5000/tcp"   # TCP 输入（可选）
      - "5044:5044"       # Beats 输入
    environment:
      - "LS_JAVA_OPTS=-Xms256m -Xmx256m"
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    volumes:
      - ./elasticsearch/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
      - ./logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
    networks:
      - monitoring
    depends_on:
      elasticsearch:
        condition: service_healthy
  #
  # TODO: 创建 logstash.yml 配置
  # mkdir -p logstash/config && echo "http.host: 0.0.0.0" > logstash/config/logstash.yml


  # ---------------------------------------------------------------------------
  # Kibana - 日志可视化与检索界面
  # ---------------------------------------------------------------------------

  # TODO: 添加 Kibana 服务
  #
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.1
    container_name: kibana
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD:-changeme}
    networks:
      - monitoring
    depends_on:
      elasticsearch:
        condition: service_healthy
  #
  # 访问 Kibana：http://localhost:5601


  # ---------------------------------------------------------------------------
  # Filebeat - 日志传输代理
  # ---------------------------------------------------------------------------

  # TODO: 添加 Filebeat 服务
  #
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.11.1
    container_name: filebeat
    restart: unless-stopped
    user: root
    command: filebeat -e -strict.perms=false
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - filebeat_data:/usr/share/filebeat/data
    networks:
      - monitoring
    depends_on:
      - logstash
  #
  # TODO: 创建 filebeat.yml 配置
  # mkdir -p filebeat && touch filebeat/filebeat.yml
  #
  # 卷挂载说明：
  # - filebeat.yml: 配置文件
  # - /var/lib/docker/containers: Docker 容器日志
  # - /var/run/docker.sock: Docker socket，用于容器发现
  # - filebeat_data: Filebeat 状态数据（日志偏移等）


  # ---------------------------------------------------------------------------
  # Node Exporter - 系统指标
  # ---------------------------------------------------------------------------

  # TODO: 添加 Node Exporter 服务
  #
  node-exporter:
    image: prom/node-exporter:v1.6.1
    container_name: node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - monitoring
  #
  # 这些卷以只读方式挂载宿主机文件系统用于采集指标
  # 命令参数用于过滤伪文件系统


  # ---------------------------------------------------------------------------
  # 示例 ML 应用（你的应用放这里）
  # ---------------------------------------------------------------------------

  # TODO: 添加你的 ML 应用服务
  # 这是一个示例，请替换为你的实际应用
  #
  ml-api:
    build: ./app
    container_name: ml-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./app:/app
      - ./logs:/var/log/app
    networks:
      - monitoring
  #
  # 你的应用应当：
  # 1. 暴露 /metrics 端点供 Prometheus 抓取
  # 2. 输出 JSON 格式日志
  # 3. 提供健康检查端点


# =============================================================================
# 使用说明
# =============================================================================

# 启动所有服务：
#   docker-compose up -d

# 查看状态：
#   docker-compose ps

# 查看日志：
#   docker-compose logs -f prometheus
#   docker-compose logs -f grafana

# 停止服务：
#   docker-compose down

# 停止并删除卷（会删除所有数据）：
#   docker-compose down -v

# 重启指定服务：
#   docker-compose restart prometheus

# 重新构建并重启：
#   docker-compose up -d --build

# 访问地址：
#   Prometheus:     http://localhost:9090
#   Alertmanager:   http://localhost:9093
#   Grafana:        http://localhost:3000  (admin/admin123)
#   Elasticsearch:  http://localhost:9200
#   Kibana:         http://localhost:5601
#   Node Exporter:  http://localhost:9100/metrics


# =============================================================================
# 故障排查
# =============================================================================

# 服务无法启动：
#   docker-compose logs <service-name>
#   docker-compose up <service-name>  # 前台启动以查看错误

# 权限问题（Elasticsearch、Filebeat）：
#   chmod -R 777 elasticsearch_data/
#   sudo chown -R 1000:1000 elasticsearch_data/

# 端口已被占用：
#   lsof -i :9090  # 查找占用端口的进程
#   docker-compose down  # 停止冲突服务

# 内存不足：
#   增加 Docker 内存限制（Docker Desktop 设置中）
#   降低 ES_JAVA_OPTS 堆大小

# 网络问题：
#   docker network ls
#   docker network inspect project-04-monitoring-alerting_monitoring

# 清空所有数据并重新开始：
#   docker-compose down -v
#   docker volume prune
#   docker-compose up -d


# =============================================================================
# 生产环境注意事项
# =============================================================================

# 1. 安全：
#    - 启用 Elasticsearch 安全功能（xpack.security.enabled=true）
#    - 使用强密码（不要默认密码！）
#    - 为所有服务启用 TLS
#    - 未认证前不要将端口公开到公网

# 2. 资源限制：
#    - 添加资源限制，避免服务耗尽主机资源
#    deploy:
#      resources:
#        limits:
#          cpus: '1'
#          memory: 2G

# 3. 高可用：
#    - 运行多个 Prometheus 实例
#    - 使用 Elasticsearch 集群（3+ 节点）
#    - 使用外部存储（不要仅依赖本地卷）

# 4. 监控监控系统本身：
#    - 为监控栈健康状态配置告警
#    - 监控 Elasticsearch 集群状态
#    - 监控 Prometheus 存储

# 5. 备份：
#    - 备份 Grafana 仪表盘（导出 JSON）
#    - 备份 Prometheus 数据（快照）
#    - 备份 Elasticsearch 索引